services:
  # PostgreSQL Database
  - type: pserv
    name: moni-db
    env: docker
    plan: free
    region: frankfurt
    databases:
      - name: moni_db
        user: moni_user

  # Backend API
  - type: web
    name: moni-api
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moni-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 7d
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRATION
        value: 30d
    healthCheckPath: /
